version: '3.8'

services:
  # The target application (configurable)
  target-app:
    image: bkimminich/juice-shop:latest
    container_name: target-app
    restart: always
    environment:
      - NODE_ENV=safe
      - PORT=3000
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # The AI WAF Service
  waf-service:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: waf-service
    restart: always
    environment:
      - MODEL_PATH=/app/model/weights
      - TARGET_WEBSITE_URL=http://target-app:3000
      - LOG_LEVEL=INFO
      - AI_CONFIDENCE_THRESHOLD=0.95
      - UNCERTAINTY_THRESHOLD=0.85
      - RULE_ENGINE_THRESHOLD=0.70
      - ANOMALY_THRESHOLD=0.75
      - COMBINED_THRESHOLD=0.85
      - RL_ENABLED=true
      - RL_EPSILON=0.1
      - RL_ALPHA=0.1
      - RL_GAMMA=0.9
      - ANOMALY_ENABLED=true
      - ANOMALY_EMBEDDING_CACHE_SIZE=1000
      - BLOCK_ON_ANOMALY=true
      - BLOCK_ON_UNCERTAIN=false
      - LOG_ALLOWED_REQUESTS=true
    env_file:
      - CONFIG.env
    volumes:
      - ./waf:/app
      - ./waf/logs:/app/logs
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.75'
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: waf-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      waf-service:
        condition: service_healthy
      target-app:
        condition: service_healthy
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  waf-net:
    driver: bridge
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  waf-net:
    driver: bridge
