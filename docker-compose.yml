version: '3.8'

services:
  # The target application (configurable)
  target-app:
    image: bkimminich/juice-shop
    container_name: target-app
    restart: always
    environment:
      - NODE_ENV=safe
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # The AI WAF Service
  waf-service:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: waf-service
    restart: always
    environment:
      - MODEL_PATH=/app/model/weights
      - AI_CONFIDENCE_THRESHOLD=${AI_CONFIDENCE_THRESHOLD:-0.95}
      - UNCERTAINTY_THRESHOLD=${UNCERTAINTY_THRESHOLD:-0.85}
    env_file:
      - CONFIG.env
    volumes:
      - ./waf:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "component=waf-service"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: waf-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      waf-service:
        condition: service_healthy
      target-app:
        condition: service_healthy
    networks:
      - waf-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  waf-net:
    driver: bridge
